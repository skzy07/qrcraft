<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRcraft — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root[data-theme="dark"] { --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13); --text: #f0f0f8; --muted: #8888aa; --grid-line: rgba(124,109,250,0.03); }
  :root[data-theme="light"] { --bg: #f5f5fa; --surface: #ffffff; --surface2: #f0f0f8; --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13); --text: #0a0a0f; --muted: #666688; --grid-line: rgba(124,109,250,0.05); }
  :root { --accent: #7c6dfa; --radius: 16px; --radius-sm: 10px; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; transition: background 0.3s, color 0.3s; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

  .top-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; z-index: 10; }
  .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #7c6dfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; animation: float 3s ease-in-out infinite; }
  .top-right { display: flex; gap: 8px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 14px; padding: 7px 12px; cursor: pointer; transition: all 0.2s; }
  .icon-btn:hover { border-color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 400px; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; transition: background 0.3s, border-color 0.3s; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; text-align: center; }
  .card-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; gap: 4px; }
  .tab { background: transparent; border: none; border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 9px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

  .field { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; transition: all 0.2s; }
  input:focus { border-color: rgba(124,109,250,0.5); box-shadow: 0 0 0 3px rgba(124,109,250,0.1); }

  .btn { width: 100%; background: linear-gradient(135deg, #7c6dfa, #c084fc); border: none; border-radius: var(--radius-sm); color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,109,250,0.3); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--muted); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn-google { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 11px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-google:hover { border-color: rgba(124,109,250,0.4); transform: translateY(-1px); }

  .msg { border-radius: 8px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; display: none; animation: fadeUp 0.3s ease both; }
  .msg-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
  .msg-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
</style>
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">QRcraft</a>
  <div class="top-right">
    <button class="icon-btn" id="lang-btn" onclick="toggleLang()">EN</button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="card">
  <div class="card-title">QRcraft</div>
  <div class="card-sub" id="card-sub">Cria e gere os teus QR codes</div>

  <div class="tabs">
    <button class="tab active" id="tab-login-btn" onclick="showTab('login',this)">Entrar</button>
    <button class="tab" id="tab-reg-btn" onclick="showTab('register',this)">Registar</button>
  </div>

  <div id="msg-error" class="msg msg-error"></div>
  <div id="msg-success" class="msg msg-success"></div>

  <!-- GOOGLE -->
  <button class="btn-google" onclick="loginGoogle()">
    <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
    <span id="google-btn-text">Continuar com Google</span>
  </button>

  <div class="divider">ou</div>

  <!-- LOGIN -->
  <div id="tab-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="o-teu@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="btn-login" onclick="login()">Entrar</button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="o-teu@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')register()">
    </div>
    <button class="btn" id="btn-register" onclick="register()">Criar conta grátis</button>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase.js'
import { getLang, setLang } from './js/i18n.js'

// Theme
const theme = localStorage.getItem('theme') || 'dark'
document.documentElement.setAttribute('data-theme', theme)
document.getElementById('theme-btn').textContent = theme === 'dark' ? '🌙' : '☀️'

// Lang
const lang = getLang()
document.getElementById('lang-btn').textContent = lang === 'pt' ? 'EN' : 'PT'
document.documentElement.lang = lang
applyLang(lang)

window.toggleTheme = () => {
  const cur = document.documentElement.getAttribute('data-theme')
  const next = cur === 'dark' ? 'light' : 'dark'
  document.documentElement.setAttribute('data-theme', next)
  localStorage.setItem('theme', next)
  document.getElementById('theme-btn').textContent = next === 'dark' ? '🌙' : '☀️'
}

window.toggleLang = () => {
  const cur = getLang()
  const next = cur === 'pt' ? 'en' : 'pt'
  setLang(next)
  document.getElementById('lang-btn').textContent = next === 'pt' ? 'EN' : 'PT'
  document.documentElement.lang = next
  applyLang(next)
}

function applyLang(lang) {
  const isEn = lang === 'en'
  document.getElementById('tab-login-btn').textContent = isEn ? 'Sign in' : 'Entrar'
  document.getElementById('tab-reg-btn').textContent = isEn ? 'Register' : 'Registar'
  document.getElementById('card-sub').textContent = isEn ? 'Create and manage your QR codes' : 'Cria e gere os teus QR codes'
  document.getElementById('google-btn-text').textContent = isEn ? 'Continue with Google' : 'Continuar com Google'
  document.getElementById('btn-login').textContent = isEn ? 'Sign in' : 'Entrar'
  document.getElementById('btn-register').textContent = isEn ? 'Create free account' : 'Criar conta grátis'
}

// Check already logged in
const { data: { user } } = await supabase.auth.getUser()
if (user) window.location.href = 'index.html'

window.showTab = (tab, btn) => {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none'
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  hideMessages()
}

window.login = async () => {
  const email = document.getElementById('login-email').value.trim()
  const pass = document.getElementById('login-pass').value
  if (!email || !pass) return showError(getLang() === 'en' ? 'Fill in all fields.' : 'Preenche todos os campos.')
  setLoading('btn-login', true)
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass })
  if (error) { showError(getLang() === 'en' ? 'Incorrect email or password.' : 'Email ou password incorretos.'); setLoading('btn-login', false) }
  else window.location.href = 'index.html'
}

window.register = async () => {
  const email = document.getElementById('reg-email').value.trim()
  const pass = document.getElementById('reg-pass').value
  const isEn = getLang() === 'en'
  if (!email || !pass) return showError(isEn ? 'Fill in all fields.' : 'Preenche todos os campos.')
  if (pass.length < 6) return showError(isEn ? 'Password must be at least 6 characters.' : 'A password tem de ter pelo menos 6 caracteres.')
  setLoading('btn-register', true)
  const { error } = await supabase.auth.signUp({
    email, password: pass,
    options: { emailRedirectTo: 'https://qrcrafteasy.vercel.app/index.html' }
  })
  if (error) { showError(isEn ? 'Error creating account.' : 'Erro ao criar conta.'); setLoading('btn-register', false) }
  else showSuccess(isEn ? 'Account created! Check your email to confirm.' : 'Conta criada! Verifica o teu email para confirmar.')
}

window.loginGoogle = async () => {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://qrcrafteasy.vercel.app/index.html' }
  })
}

function showError(msg) { const el = document.getElementById('msg-error'); el.textContent = msg; el.style.display = 'block'; document.getElementById('msg-success').style.display = 'none' }
function showSuccess(msg) { const el = document.getElementById('msg-success'); el.textContent = msg; el.style.display = 'block'; document.getElementById('msg-error').style.display = 'none' }
function hideMessages() { document.getElementById('msg-error').style.display = 'none'; document.getElementById('msg-success').style.display = 'none' }

function setLoading(id, loading) {
  const btn = document.getElementById(id)
  const isEn = getLang() === 'en'
  btn.disabled = loading
  if (loading) { btn.textContent = isEn ? 'Loading...' : 'A carregar...' }
  else { btn.textContent = id === 'btn-login' ? (isEn ? 'Sign in' : 'Entrar') : (isEn ? 'Create free account' : 'Criar conta grátis') }
}
</script>
</body>
</html>

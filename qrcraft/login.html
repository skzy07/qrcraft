<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRcraft — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --accent: #7c6dfa; --accent2: #c084fc; --text: #f0f0f8; --muted: #8888aa;
    --radius: 16px; --radius-sm: 10px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
    background: linear-gradient(135deg, #7c6dfa, #c084fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 32px; position: relative; z-index: 1;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px;
    width: 100%; max-width: 420px;
    position: relative; z-index: 1;
  }
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 4px; margin-bottom: 28px; gap: 4px;
  }
  .tab {
    background: transparent; border: none; border-radius: 8px;
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; padding: 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .tab.active { background: var(--surface); color: var(--text); }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 12px 16px; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(124,109,250,0.5); box-shadow: 0 0 0 3px rgba(124,109,250,0.1); }
  .btn {
    width: 100%; background: linear-gradient(135deg, #7c6dfa, #c084fc);
    border: none; border-radius: var(--radius-sm); color: #fff;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    padding: 14px; cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; color: var(--muted); font-size: 13px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-google {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    padding: 12px; cursor: pointer; transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-google:hover { border-color: var(--border2); background: var(--surface); }
  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; padding: 12px 14px;
    color: #f87171; font-size: 13px; margin-bottom: 16px; display: none;
  }
  .success {
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);
    border-radius: 8px; padding: 12px 14px;
    color: #4ade80; font-size: 13px; margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>
<div class="logo">QRcraft</div>
<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('login', this)">Entrar</button>
    <button class="tab" onclick="showTab('register', this)">Registar</button>
  </div>

  <div id="msg-error" class="error"></div>
  <div id="msg-success" class="success"></div>

  <!-- LOGIN -->
  <div id="tab-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="o-teu@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn" id="btn-login" onclick="login()">Entrar</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Continuar com Google
    </button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="o-teu@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
    </div>
    <button class="btn" id="btn-register" onclick="register()">Criar conta grátis</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Continuar com Google
    </button>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabase.js'

// Check if already logged in
const { data: { user } } = await supabase.auth.getUser()
if (user) window.location.href = 'index.html'

window.showTab = (tab, btn) => {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none'
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  hideMessages()
}

window.login = async () => {
  const email = document.getElementById('login-email').value
  const pass = document.getElementById('login-pass').value
  if (!email || !pass) return showError('Preenche todos os campos.')
  setBtnLoading('btn-login', true)
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass })
  if (error) { showError('Email ou password incorretos.'); setBtnLoading('btn-login', false) }
  else window.location.href = 'index.html'
}

window.register = async () => {
  const email = document.getElementById('reg-email').value
  const pass = document.getElementById('reg-pass').value
  if (!email || !pass) return showError('Preenche todos os campos.')
  if (pass.length < 6) return showError('A password tem de ter pelo menos 6 caracteres.')
  setBtnLoading('btn-register', true)
  const { error } = await supabase.auth.signUp({ email, password: pass })
  if (error) { showError('Erro ao criar conta. Tenta outro email.'); setBtnLoading('btn-register', false) }
  else showSuccess('Conta criada! Verifica o teu email para confirmar.')
}

window.loginGoogle = async () => {
  await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/index.html' } })
}

function showError(msg) {
  const el = document.getElementById('msg-error')
  el.textContent = msg; el.style.display = 'block'
  document.getElementById('msg-success').style.display = 'none'
}

function showSuccess(msg) {
  const el = document.getElementById('msg-success')
  el.textContent = msg; el.style.display = 'block'
  document.getElementById('msg-error').style.display = 'none'
}

function hideMessages() {
  document.getElementById('msg-error').style.display = 'none'
  document.getElementById('msg-success').style.display = 'none'
}

function setBtnLoading(id, loading) {
  const btn = document.getElementById(id)
  btn.disabled = loading
  btn.textContent = loading ? 'A carregar...' : (id === 'btn-login' ? 'Entrar' : 'Criar conta grátis')
}
</script>
</body>
</html>
